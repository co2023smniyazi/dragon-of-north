version: "1.0"

linter: jetbrains/qodana-jvm-community:2025.3

profile:
  name: qodana.recommended

failThreshold: 10

exclude:
  - name: Exclude generated and build files
    paths:
      - build/
      - target/
      - node_modules/
      - .git/

disable:
  - HardcodedPasswords
  - CsrfProtection

inspections:
  - group: Security
    enabled: true
  - group: Probable bugs
    enabled: true
  - group: Java
    enabled: true