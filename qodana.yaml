version: "1.0"

profile:
  name: qodana.recommended

bootstrap: sh ./mvnw -q -DskipTests compile test-compile

failThreshold: 5

include:
  - name: Backend source and tests
    paths:
      - src/main/java
      - src/test/java
      - src/main/resources
      - pom.xml

exclude:
  - name: Build and cache artifacts
    paths:
      - target/
      - build/
      - .git/
      - node_modules/
  - name: Non-JVM app surfaces scanned in separate pipelines
    paths:
      - frontend/
      - load_tests/
      - diagrams_and_readme/
      - keys/
