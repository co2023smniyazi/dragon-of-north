<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
          rel="stylesheet"/>
    <link href="/favicon.svg?v=20260321" rel="icon" type="image/svg+xml"/>
    <title>Dragon of North – Developer-First Authentication Infrastructure</title>
    <script>
        (() => {
            const key = 'don-theme';
            const saved = localStorage.getItem(key);
            const media = window.matchMedia('(prefers-color-scheme: dark)');
            const preference = (saved === 'light' || saved === 'dark' || saved === 'system') ? saved : 'system';
            const mode = preference === 'system' ? (media.matches ? 'dark' : 'light') : preference;

            document.documentElement.setAttribute('data-theme', mode);
            document.documentElement.classList.toggle('dark', mode === 'dark');
        })();
    </script>
</head>
<body>
<div id="root"></div>
<script src="src/main.jsx" type="module"></script>
</body>
</html>
