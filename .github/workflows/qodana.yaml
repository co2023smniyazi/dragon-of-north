name: Qodana

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  qodana:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          args: --image,jetbrains/qodana-jvm-community:2025.3
          pr-mode: true              # scan only changed files → less noise
          use-caches: true
          upload-result: true        # view reports in GitHub UI
          post-pr-comment: true
          use-annotations: true